<div class="video-container">
    <iframe 
        src="https://www.youtube-nocookie.com/embed/{{ id }}"
        title="{{ title | default(value='Video') }}"
        frameborder="0"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen
        loading="lazy">
    </iframe>
</div>
