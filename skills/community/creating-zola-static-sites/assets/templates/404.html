{% extends "base.html" %}

{% block title %}Page Not Found | {{ config.title }}{% endblock %}

{% block content %}
<div class="error-page">
    <h1>404</h1>
    <h2>Page Not Found</h2>
    <p>The page you're looking for doesn't exist or has been moved.</p>
    <a href="{{ config.base_url }}" class="button">Go Home</a>
</div>
{% endblock content %}
